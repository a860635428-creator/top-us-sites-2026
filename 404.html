<!DOCTYPE html>
<html>
  <head>
    <!--
      SPA 路由修复：当 GitHub Pages 返回 404 时，
      把原始 URL 存到 sessionStorage，然后重定向到首页。
      index.html 会读取 sessionStorage 并恢复正确的路由。
    -->
    <script>
      sessionStorage.setItem('spa_redirect', location.href);
      location.href = '/';
    </script>
  </head>
</html>
