<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Supabase Connection Test</title></head>
<body style="font-family:sans-serif; padding:40px;">
  <h2>Supabase Connection Test</h2>
  <button onclick="testSignUp()" style="padding:10px 20px; font-size:16px;">Test SignUp API</button>
  <button onclick="testHealth()" style="padding:10px 20px; font-size:16px; margin-left:10px;">Test Health</button>
  <pre id="result" style="background:#f5f5f5; padding:20px; margin-top:20px; border-radius:8px;"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://zmqtvkswgjjartnwanqi.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_H19HL0FgV2qNi2dJ33guEw_nM0P7Q9J'

    async function testHealth() {
      document.getElementById('result').textContent = 'Testing...'
      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/health`, {
          headers: { 'apikey': SUPABASE_KEY }
        })
        const text = await res.text()
        document.getElementById('result').textContent = 
          `Health Check:\nHTTP ${res.status}\n${text}`
      } catch(e) {
        document.getElementById('result').textContent = `Health Error:\n${e.message}\n\nThis means supabase.co is blocked in your network.`
      }
    }

    async function testSignUp() {
      document.getElementById('result').textContent = 'Testing signup...'
      try {
        const { createClient } = supabase
        const client = createClient(SUPABASE_URL, SUPABASE_KEY)
        const { data, error } = await client.auth.signUp({
          email: `test${Date.now()}@example.com`,
          password: 'Test123456',
        })
        document.getElementById('result').textContent = 
          `SignUp Result:\n${JSON.stringify({ data, error }, null, 2)}`
      } catch(e) {
        document.getElementById('result').textContent = `SignUp Error:\n${e.message}`
      }
    }
  </script>
</body>
</html>
