<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USMLE Prep - Redirecting...</title>
    <!--
      SPA Routing Fix for GitHub Pages:
      GitHub Pages returns 404 for any path that doesn't match a physical file.
      This 404.html saves the original URL to sessionStorage and redirects
      to the root. The main app (index.html) reads sessionStorage and restores
      the correct route via history.replaceState.

      For crawlers: meta refresh provides a fallback path.
    -->
    <meta http-equiv="refresh" content="0;url=/" />
    <link rel="canonical" href="https://stepprepare.com/" />
    <script>
      (function() {
        // Save the original URL the user was trying to reach
        var url = window.location.href;
        sessionStorage.setItem('spa_redirect', url);
        // Redirect to root; index.html will restore the correct route
        window.location.replace('/');
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/">USMLE Prep</a>...</p>
  </body>
</html>
