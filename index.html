    <!-- Structured Data: Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "USMLE Prep Platform",
      "url": "https://hebin.fun/",
      "description": "Free USMLE practice questions with multi-language explanations in Chinese and Spanish for international medical graduates.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://hebin.fun/question-bank?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: FAQ Page (helps appear in Google "People Also Ask") -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is this USMLE prep website free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! The question bank, mock exams, and multi-language explanations are completely free to use. No credit card required."
          }
        },
        {
          "@type": "Question",
          "name": "How is this different from UWorld or Amboss?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our unique feature is multi-language explanations in Chinese and Spanish, making it easier for international medical graduates to understand complex USMLE concepts."
          }
        },
        {
          "@type": "Question",
          "name": "Do the questions match the real USMLE exam?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, our questions are designed to mimic the style and difficulty of real USMLE questions across Step 1, Step 2 CK, and Step 3."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use this USMLE prep site on mobile?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely! Our website is fully responsive and works great on mobile devices. Practice USMLE questions anytime, anywhere."
          }
        },
        {
          "@type": "Question",
          "name": "How do I switch the explanation language?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "During practice, you can switch between English, Chinese (中文), and Spanish (Español) explanations using the language toggle at the top of the question interface."
          }
        },
        {
          "@type": "Question",
          "name": "Are these questions AI-generated? Are they accurate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most of our practice questions are AI-generated for educational purposes. While we strive for accuracy, AI-generated content may contain errors or outdated information. Always verify answers with official resources (First Aid, UWorld, NBME practice exams) before your exam."
          }
        },
        {
          "@type": "Question",
          "name": "Is this website affiliated with NBME or USMLE?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. This site is an independent educational platform and is NOT affiliated with the National Board of Medical Examiners (NBME), the USMLE program, or the Federation of State Medical Boards (FSMB). All questions are original/AI-generated content."
          }
        },
      ]
    }
    </script>

    <!-- SPA 路由修复 -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          var url = new URL(redirect);
          history.replaceState(null, null, url.pathname + url.search + url.hash);
        }
      })();
